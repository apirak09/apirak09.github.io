<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Angry Birds - 5 Stages</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        h1 { margin: 5px 0; font-size: 24px; }
        #gameUi {
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        canvas {
            background: linear-gradient(#70c5ce, #9cd2d6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            cursor: pointer;
        }
        #resetBtn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        #resetBtn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h1>Mini Angry Birds (5 ด่าน)</h1>
    <div id="gameUi">ด่าน: <span id="levelDisplay">1</span>/5 | คะแนน: <span id="scoreDisplay">0</span></div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <button id="resetBtn" onclick="resetLevel()">เริ่มด่านนี้ใหม่</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const levelDisplay = document.getElementById('levelDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');

// สถานะเกม
let currentLevel = 1;
let score = 0;
let isDragging = false;

// พิกัดแท่นยิง (Slingshot)
const slingX = 150;
const slingY = 300;

// โครงสร้างตัวละคร/วัตถุ
let bird = { x: slingX, y: slingY, radius: 15, vx: 0, vy: 0, launched: false, inAir: false };
let pigs = [];
let blocks = [];

// กำหนดข้อมูลทั้ง 5 ด่าน (ตำแหน่ง หมู และ กล่อง)
const levelsData = {
    1: {
        pigs: [{ x: 650, y: 350, radius: 15, alive: true }],
        blocks: [
            { x: 600, y: 300, w: 20, h: 100 },
            { x: 680, y: 300, w: 20, h: 100 }
        ]
    },
    2: {
        pigs: [{ x: 650, y: 270, radius: 15, alive: true }],
        blocks: [
            { x: 600, y: 300, w: 20, h: 100 },
            { x: 680, y: 300, w: 20, h: 100 },
            { x: 590, y: 280, w: 120, h: 20 } // หลังคาคาดสลับ
        ]
    },
    3: {
        pigs: [
            { x: 600, y: 350, radius: 15, alive: true },
            { x: 700, y: 350, radius: 15, alive: true }
        ],
        blocks: [
            { x: 550, y: 300, w: 20, h: 100 },
            { x: 650, y: 300, w: 20, h: 100 },
            { x: 750, y: 300, w: 20, h: 100 }
        ]
    },
    4: {
        pigs: [
            { x: 650, y: 350, radius: 15, alive: true },
            { x: 650, y: 230, radius: 15, alive: true } // หมูสองชั้น
        ],
        blocks: [
            { x: 600, y: 300, w: 20, h: 100 },
            { x: 680, y: 300, w: 20, h: 100 },
            { x: 590, y: 280, w: 120, h: 20 },
            { x: 610, y: 180, w: 20, h: 100 },
            { x: 670, y: 180, w: 20, h: 100 }
        ]
    },
    5: {
        pigs: [
            { x: 550, y: 350, radius: 12, alive: true },
            { x: 650, y: 350, radius: 15, alive: true },
            { x: 750, y: 350, radius: 12, alive: true }
        ],
        blocks: [
            { x: 500, y: 250, w: 20, h: 150 },
            { x: 600, y: 250, w: 20, h: 150 },
            { x: 700, y: 250, w: 20, h: 150 },
            { x: 490, y: 230, w: 240, h: 20 }
        ]
    }
};

// โหลดด่าน
function initLevel(lvl) {
    if (lvl > 5) {
        alert("ยินดีด้วย! คุณผ่านครบทั้ง 5 ด่านแล้ว!");
        currentLevel = 1;
        score = 0;
        lvl = 1;
    }
    
    currentLevel = lvl;
    levelDisplay.textContent = currentLevel;
    scoreDisplay.textContent = score;

    // รีเซ็ตนก
    bird.x = slingX;
    bird.y = slingY;
    bird.vx = 0;
    bird.vy = 0;
    bird.launched = false;
    bird.inAir = false;

    // ดึงข้อมูลด่าน (ใช้ Deep Copy ป้องกันบั๊กเวลาเล่นซ้ำ)
    const data = levelsData[lvl];
    pigs = data.pigs.map(p => ({ ...p }));
    blocks = data.blocks.map(b => ({ ...b }));
}

function resetLevel() {
    initLevel(currentLevel);
}

// ตรวจสอบการชน (Collision Detection)
function checkCollision() {
    // นกชนกล่อง
    blocks.forEach(b => {
        if (bird.x + bird.radius > b.x && bird.x - bird.radius < b.x + b.w &&
            bird.y + bird.radius > b.y && bird.y - bird.radius < b.y + b.h) {
            // ชนแล้วเด้งกลับแบบง่าย
            bird.vx *= -0.6;
            bird.vy *= -0.6;
        }
    });

    // นกชนหมู
    pigs.forEach(p => {
        if (p.alive) {
            let dx = bird.x - p.x;
            let dy = bird.y - p.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < bird.radius + p.radius) {
                p.alive = false;
                score += 100;
                scoreDisplay.textContent = score;
            }
        }
    });
}

// อัปเดตตำแหน่งและการเคลื่อนที่
function update() {
    if (bird.inAir) {
        bird.x += bird.vx;
        bird.y += bird.vy;
        bird.vy += 0.25; // แรงโน้มถ่วง (Gravity)

        checkCollision();

        // นกตกพื้นหรือเลยขอบจอ -> รีเซ็ตนกใหม่ถ้าหมูยังไม่ตายหมด
        if (bird.y > canvas.height - bird.radius || bird.x > canvas.width || bird.x < 0) {
            bird.inAir = false;
            setTimeout(() => {
                if (pigs.some(p => p.alive)) {
                    bird.x = slingX;
                    bird.y = slingY;
                    bird.vx = 0;
                    bird.vy = 0;
                    bird.launched = false;
                }
            }, 1000);
        }
    }

    // ตรวจสอบว่าหมูตายหมดหรือยัง -> ขึ้นด่านใหม่
    const allPigsDead = pigs.every(p => !p.alive);
    if (allPigsDead && !bird.inAir) {
        setTimeout(() => {
            initLevel(currentLevel + 1);
        }, 500);
    }
}

// วาดกราฟิกลง Canvas
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // วาดพื้นดิน
    ctx.fillStyle = '#8bc34a';
    ctx.fillRect(0, 370, canvas.width, 30);

    // วาดหนังสติ๊ก (Slingshot)
    ctx.fillStyle = '#795548';
    ctx.fillRect(slingX - 5, slingY, 10, 70);

    // วาดเส้นยางหนังสติ๊กตอนลาก
    if (isDragging) {
        ctx.strokeStyle = '#3e2723';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(slingX, slingY);
        ctx.lineTo(bird.x, bird.y);
        ctx.stroke();
    }

    // วาดกล่องไม้ (Blocks)
    ctx.fillStyle = '#d7ccc8';
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 2;
    blocks.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeRect(b.x, b.y, b.w, b.h);
    });

    // วาดหมู (Pigs)
    pigs.forEach(p => {
        if (p.alive) {
            ctx.fillStyle = '#4caf50';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            // ลูกตาหมู
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x - 5, p.y - 3, 3, 0, Math.PI * 2);
            ctx.arc(p.x + 5, p.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // วาดนก (Bird)
    ctx.fillStyle = '#e53935';
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fill();
    // ตาและจะงอยปากนก
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bird.x + 5, bird.y - 4, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath();
    ctx.moveTo(bird.x + 10, bird.y);
    ctx.lineTo(bird.x + 18, bird.y + 2);
    ctx.lineTo(bird.x + 10, bird.y + 5);
    ctx.fill();
}

// ลูปหลักของเกม
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ส่วนควบคุมการลากและยิง (Mouse & Touch Events)
function getMousePos(evt) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (evt.clientX || evt.touches[0].clientX) - rect.left,
        y: (evt.clientY || evt.touches[0].clientY) - rect.top
    };
}

function handleStart(e) {
    if (bird.launched) return;
    const pos = getMousePos(e);
    let dx = pos.x - bird.x;
    let dy = pos.y - bird.y;
    if (Math.sqrt(dx*dx + dy*dy) < bird.radius + 10) {
        isDragging = true;
    }
}

function handleMove(e) {
    if (!isDragging) return;
    const pos = getMousePos(e);
    
    // จำกัดระยะลากหนังสติ๊กไม่ให้ไกลเกินไป
    let dx = pos.x - slingX;
    let dy = pos.y - slingY;
    let distance = Math.sqrt(dx * dx + dy * dy);
    const maxDrag = 80;

    if (distance > maxDrag) {
        let angle = Math.atan2(dy, dx);
        bird.x = slingX + Math.cos(angle) * maxDrag;
        bird.y = slingY + Math.sin(angle) * maxDrag;
    } else {
        bird.x = pos.x;
        bird.y = pos.y;
    }
}

function handleEnd() {
    if (!isDragging) return;
    isDragging = false;
    bird.launched = true;
    bird.inAir = true;

    // คำนวณความเร็วจากการปล่อย (ยิ่งลากไกล ยิ่งยิงแรง)
    bird.vx = (slingX - bird.x) * 0.15;
    bird.vy = (slingY - bird.y) * 0.15;
}

// ผูก Event ทั้งเมาส์และจอสัมผัส (มือถือ)
canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

canvas.addEventListener('touchstart', handleStart);
canvas.addEventListener('touchmove', handleMove);
window.addEventListener('touchend', handleEnd);

// เริ่มเกมด่านแรก
initLevel(1);
gameLoop();
</script>

</body>
</html>
